<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spaceship Dodge Game</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    canvas {
        background: radial-gradient(circle at center, #111, #000);
        display: block;
        margin: 0 auto;
    }

    #ui {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
        z-index: 10;
    }

    button {
        margin: 5px;
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
    }

    #startScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 20;
    }

    #startScreen h1 {
        margin-bottom: 20px;
    }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen">
    <h1>🚀 Spaceship Dodge</h1>
    <p>Select Difficulty</p>
    <button onclick="startGame(1.5)">🟢 Easy</button>
    <button onclick="startGame(2.5)">🟡 Medium</button>
    <button onclick="startGame(3.5)">🔴 Hard</button>
</div>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="highScore">High Score: 0</div>
    <div id="status">Status: Not Started</div>
    <button onclick="togglePause()">Pause / Resume</button>
    <button onclick="restartGame()">Restart</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").textContent = "High Score: " + highScore;

let gameOver = false;
let paused = false;
let gameStarted = false;

// 🔥 difficulty multiplier (set by start screen)
let difficulty = 1;

const ship = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    size: 20,
    speed: 6
};

let asteroids = [];
let boosters = [];

// ASTEROIDS
function createAsteroid() {
    return {
        x: Math.random() * canvas.width,
        y: -50,
        size: 20 + Math.random() * 30,
        speed: (2 + Math.random() * 2) * difficulty
    };
}

// BOOSTERS
function createBooster() {
    return {
        x: Math.random() * canvas.width,
        y: -20,
        size: 12,
        speed: 3 + difficulty * 0.3
    };
}

// SPAWN SYSTEM
let asteroidInterval;
let boosterInterval;
let scoreInterval;

function startSpawning() {
    asteroidInterval = setInterval(() => {
        if (!gameOver && !paused) asteroids.push(createAsteroid());
    }, 650);

    boosterInterval = setInterval(() => {
        if (!gameOver && !paused) boosters.push(createBooster());
    }, 2800);

    scoreInterval = setInterval(() => {
        if (!gameOver && !paused) {
            score++;
            difficulty += 0.03;

            document.getElementById("score").textContent = "Score: " + score;
        }
    }, 1000);
}

// START GAME WITH DIFFICULTY
function startGame(level) {
    difficulty = level;

    document.getElementById("startScreen").style.display = "none";

    gameStarted = true;
    document.getElementById("status").textContent = "Status: Running";

    startSpawning();
}

// INPUT
document.addEventListener("keydown", e => {
    keys[e.key] = true;
    if (e.key === " ") togglePause();
});

document.addEventListener("keyup", e => keys[e.key] = false);

// PAUSE
function togglePause() {
    if (gameOver || !gameStarted) return;

    paused = !paused;
    document.getElementById("status").textContent =
        "Status: " + (paused ? "Paused" : "Running");
}

function update() {
    if (gameOver || paused || !gameStarted) return;

    // ship movement
    if (keys["ArrowLeft"]) ship.x -= ship.speed;
    if (keys["ArrowRight"]) ship.x += ship.speed;
    if (keys["ArrowUp"]) ship.y -= ship.speed;
    if (keys["ArrowDown"]) ship.y += ship.speed;

    ship.x = Math.max(0, Math.min(canvas.width, ship.x));
    ship.y = Math.max(0, Math.min(canvas.height, ship.y));

    // asteroids
    for (let a of asteroids) {
        a.y += a.speed;

        let dx = ship.x - a.x;
        let dy = ship.y - a.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < a.size) {
            endGame();
        }
    }

    // boosters
    for (let b of boosters) {
        b.y += b.speed;

        let dx = ship.x - b.x;
        let dy = ship.y - b.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < b.size + 10) {
            score += 5;
            document.getElementById("score").textContent = "Score: " + score;
            b.y = canvas.height + 100;
        }
    }

    asteroids = asteroids.filter(a => a.y < canvas.height + 100);
    boosters = boosters.filter(b => b.y < canvas.height + 100);
}

function drawShip() {
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.moveTo(ship.x, ship.y - 15);
    ctx.lineTo(ship.x - 10, ship.y + 10);
    ctx.lineTo(ship.x + 10, ship.y + 10);
    ctx.closePath();
    ctx.fill();
}

function drawAsteroids() {
    ctx.fillStyle = "gray";
    for (let a of asteroids) {
        ctx.beginPath();
        ctx.arc(a.x, a.y, a.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawBoosters() {
    ctx.fillStyle = "gold";
    for (let b of boosters) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawShip();
    drawAsteroids();
    drawBoosters();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function endGame() {
    gameOver = true;

    if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
    }

    document.getElementById("highScore").textContent = "High Score: " + highScore;
    document.getElementById("status").textContent = "Status: Game Over";

    setTimeout(() => {
        alert("Game Over! Your score: " + score);
    }, 100);
}

function restartGame() {
    score = 0;
    difficulty = 1;

    asteroids = [];
    boosters = [];
    gameOver = false;
    paused = false;
    gameStarted = false;

    ship.x = canvas.width / 2;
    ship.y = canvas.height - 100;

    document.getElementById("score").textContent = "Score: 0";
    document.getElementById("status").textContent = "Status: Not Started";

    document.getElementById("startScreen").style.display = "flex";

    clearInterval(asteroidInterval);
    clearInterval(boosterInterval);
    clearInterval(scoreInterval);
}

loop();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
